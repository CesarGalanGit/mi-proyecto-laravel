services:
    app:
        build: .
        ports:
            - "8080:8080"
        environment:
            - APP_ENV=production
            - DB_HOST=mysql
            - DB_PORT=3306
            - DB_DATABASE=prueba-php
            - DB_USERNAME=sail
            - DB_PASSWORD=password
        depends_on:
            - mysql
        volumes:
            - ./storage:/app/storage

    mysql:
        image: mysql:8.4
        ports:
            - "3306:3306"
        environment:
            MYSQL_ROOT_PASSWORD: rootpassword
            MYSQL_DATABASE: prueba-php
            MYSQL_USER: sail
            MYSQL_PASSWORD: password
        volumes:
            - mysql_data:/var/lib/mysql

volumes:
    mysql_data:
