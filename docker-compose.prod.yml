services:
  app:
    image: ${DOCKER_IMAGE:-tu_usuario_dockerhub/mi-proyecto-laravel:latest}
    container_name: app
    restart: always
    working_dir: /var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laravel-prod

  web:
    image: nginx:alpine
    container_name: web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - public-data:/var/www/public:ro
    depends_on:
      - app
    networks:
      - laravel-prod

  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: always
    environment:
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_USER: '${DB_USERNAME}'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
      retries: 5
      timeout: 10s
    volumes:
      - db-prod-data:/var/lib/mysql
    networks:
      - laravel-prod

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 5
      timeout: 10s
    volumes:
      - redis-prod-data:/data
    networks:
      - laravel-prod

networks:
  laravel-prod:
    driver: bridge

volumes:
  db-prod-data:
    driver: local
  redis-prod-data:
    driver: local
  public-data:
    driver: local
