services:
  app:
    image: ${DOCKER_IMAGE:-laravel-app-prod:latest}
    container_name: app-prod
    restart: always
    working_dir: /var/www
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
      DB_DATABASE: '${DB_DATABASE:-prueba-php}'
      DB_USERNAME: '${DB_USERNAME:-sail}'
      DB_PASSWORD: '${DB_PASSWORD:-password}'
      DB_HOST: mysql
      REDIS_HOST: redis
      SCOUT_DRIVER: '${SCOUT_DRIVER:-algolia}'
      SCOUT_QUEUE: '${SCOUT_QUEUE:-false}'
      ALGOLIA_APP_ID: '${ALGOLIA_APP_ID}'
      ALGOLIA_SECRET: '${ALGOLIA_SECRET}'
      ALGOLIA_INDEX: '${ALGOLIA_INDEX:-cars}'
    volumes:
      - public-data:/var/www/public
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laravel-prod

  web:
    image: nginx:alpine
    container_name: web-prod
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - public-data:/var/www/public:ro
    depends_on:
      - app
    networks:
      - laravel-prod

  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: always
    environment:
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_USER: '${DB_USERNAME}'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
      retries: 5
      timeout: 10s
    volumes:
      - db-prod-data:/var/lib/mysql
    networks:
      - laravel-prod

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 5
      timeout: 10s
    volumes:
      - redis-prod-data:/data
    networks:
      - laravel-prod

networks:
  laravel-prod:
    driver: bridge

volumes:
  db-prod-data:
    driver: local
  redis-prod-data:
    driver: local
  public-data:
    driver: local
