services:
  app:
    # Sustituye 'tu_usuario_dockerhub' por tu usuario real en el servidor o usa una variable de entorno .env en producción
    image: ${DOCKER_IMAGE:-tu_usuario_dockerhub/mi-proyecto-laravel:latest}
    container_name: app
    restart: always
    working_dir: /var/www
    depends_on:
      - mysql
      - redis
    networks:
      - laravel-prod

  web:
    image: nginx:alpine
    container_name: web
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nnginx solo necesita leer estáticos, compartimos el public folder a través de un volumen nombrado o montando el repo
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - public-data:/var/www/public:ro
    depends_on:
      - app
    networks:
      - laravel-prod

  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: always
    environment:
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
      MYSQL_USER: '${DB_USERNAME}'
    volumes:
      - db-prod-data:/var/lib/mysql
    networks:
      - laravel-prod

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    volumes:
      - redis-prod-data:/data
    networks:
      - laravel-prod

networks:
  laravel-prod:
    driver: bridge

volumes:
  db-prod-data:
    driver: local
  redis-prod-data:
    driver: local
  public-data:
    driver: local
