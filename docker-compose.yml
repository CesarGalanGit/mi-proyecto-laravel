services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: php-base
    image: laravel-app-dev
    restart: unless-stopped
    working_dir: /var/www
    environment:
      SCOUT_DRIVER: '${SCOUT_DRIVER:-algolia}'
      SCOUT_QUEUE: '${SCOUT_QUEUE:-false}'
      ALGOLIA_APP_ID: '${ALGOLIA_APP_ID}'
      ALGOLIA_SECRET: '${ALGOLIA_SECRET}'
      ALGOLIA_INDEX: '${ALGOLIA_INDEX:-cars}'
    volumes:
      - ./:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laravel

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
      - "5173:5173" # Puerto por defecto de Vite
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - laravel

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: '${DB_DATABASE:-prueba-php}'
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-password}'
      MYSQL_PASSWORD: '${DB_PASSWORD:-password}'
      MYSQL_USER: '${DB_USERNAME:-sail}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD:-password}"]
      retries: 3
      timeout: 5s
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - laravel

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s
    volumes:
      - redis-data:/data
    networks:
      - laravel

  mailpit:
    image: 'axllent/mailpit:latest'
    ports:
      - '1025:1025'
      - '8025:8025'
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  db-data:
    driver: local
  redis-data:
    driver: local
