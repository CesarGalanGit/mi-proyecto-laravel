services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - laravel

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
      - "5173:5173" # Puerto por defecto de Vite
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: '${DB_DATABASE:-prueba-php}'
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-password}'
      MYSQL_PASSWORD: '${DB_PASSWORD:-password}'
      MYSQL_USER: '${DB_USERNAME:-sail}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - laravel

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - laravel

  mailpit:
    image: 'axllent/mailpit:latest'
    ports:
      - '1025:1025'
      - '8025:8025'
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  db-data:
    driver: local
  redis-data:
    driver: local
